name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "apps/ui/**"
      - "apps/landing/**"
      - "apps/executor/**"
      - "apps/iac/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AZURE_RESOURCE_GROUP: coglity-rg
  FUNCTION_APP_NAME: coglity-executor

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ui: ${{ steps.filter.outputs.ui }}
      landing: ${{ steps.filter.outputs.landing }}
      executor: ${{ steps.filter.outputs.executor }}
      iac-core: ${{ steps.filter.outputs.iac-core }}
      iac-apps: ${{ steps.filter.outputs.iac-apps }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "apps/backend/**"
              - "packages/shared/**"
              - "pnpm-lock.yaml"
            ui:
              - "apps/ui/**"
              - "packages/shared/**"
              - "pnpm-lock.yaml"
            landing:
              - "apps/landing/**"
              - "pnpm-lock.yaml"
            executor:
              - "apps/executor/**"
              - "packages/shared/**"
              - "pnpm-lock.yaml"
            iac-core:
              - "apps/iac/core/**"
              - "apps/iac/apps/src/**"
              - "apps/iac/package.json"
            iac-apps:
              - "apps/iac/apps/**"
              - "apps/iac/package.json"

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and push
        run: |
          docker build -f apps/backend/Dockerfile -t $ACR_LOGIN_SERVER/coglity-backend:${{ github.sha }} -t $ACR_LOGIN_SERVER/coglity-backend:latest .
          docker push $ACR_LOGIN_SERVER/coglity-backend:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/coglity-backend:latest

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppName: coglity-backend
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/coglity-backend:${{ github.sha }}

  ui:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and push
        run: |
          docker build -f apps/ui/Dockerfile -t $ACR_LOGIN_SERVER/coglity-ui:${{ github.sha }} -t $ACR_LOGIN_SERVER/coglity-ui:latest .
          docker push $ACR_LOGIN_SERVER/coglity-ui:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/coglity-ui:latest

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppName: coglity-ui
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/coglity-ui:${{ github.sha }}

  landing:
    needs: changes
    if: needs.changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and push
        run: |
          docker build -f apps/landing/Dockerfile -t $ACR_LOGIN_SERVER/coglity-landing:${{ github.sha }} -t $ACR_LOGIN_SERVER/coglity-landing:latest .
          docker push $ACR_LOGIN_SERVER/coglity-landing:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/coglity-landing:latest

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppName: coglity-landing
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/coglity-landing:${{ github.sha }}

  executor:
    needs: changes
    if: needs.changes.outputs.executor == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + executor
        run: |
          pnpm --filter @coglity/shared build
          pnpm --filter @coglity/executor build

      - name: Prepare deployment package
        run: |
          cd apps/executor
          mkdir -p deploy
          cp -r dist deploy/
          cp -r node_modules deploy/
          cp host.json deploy/
          cp package.json deploy/
          cd deploy && zip -r ../deploy.zip .

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: apps/executor/deploy.zip

  iac-core:
    needs: changes
    if: needs.changes.outputs.iac-core == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: cd apps/iac && pnpm install --frozen-lockfile

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi up (core)
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ secrets.PULUMI_ORG }}/coglity-core/core-prod
          work-dir: apps/iac/core
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

  iac-apps:
    needs: [changes, iac-core]
    if: always() && needs.changes.outputs.iac-apps == 'true' && (needs.iac-core.result == 'success' || needs.iac-core.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: cd apps/iac && pnpm install --frozen-lockfile

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi up (apps)
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ secrets.PULUMI_ORG }}/coglity-apps/apps-prod
          work-dir: apps/iac/apps
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
