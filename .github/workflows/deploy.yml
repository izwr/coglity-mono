name: Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'apps/*/package.json'
      - 'packages/*/package.json'
      - 'apps/backend/**'
      - 'apps/ui/**'
      - 'apps/landing/**'
      - 'apps/iac/**'
      - 'packages/shared/**'
      - 'bun.lock'
      - '.github/workflows/deploy.yml'

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AZURE_RESOURCE_GROUP: coglity-rg

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ui: ${{ steps.filter.outputs.ui }}
      landing: ${{ steps.filter.outputs.landing }}
      iac-core: ${{ steps.filter.outputs.iac-core }}
      iac-apps: ${{ steps.filter.outputs.iac-apps }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "package.json"
              - "apps/*/package.json"
              - "packages/*/package.json"
              - "apps/backend/**"
              - "packages/shared/**"
              - "bun.lock"
            ui:
              - "package.json"
              - "apps/*/package.json"
              - "packages/*/package.json"
              - "apps/ui/**"
              - "packages/shared/**"
              - "bun.lock"
            landing:
              - "package.json"
              - "apps/*/package.json"
              - "packages/*/package.json"
              - "apps/landing/**"
              - "bun.lock"
            iac-core:
              - "apps/iac/core/**"
              - "apps/iac/apps/src/**"
              - "apps/iac/package.json"
            iac-apps:
              - "apps/iac/apps/**"
              - "apps/iac/package.json"

  # Gate image builds on a passing type-check so a broken build can't be pushed and deployed.
  lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # Scoped to the apps this workflow builds. (landing's `next lint` is misconfigured and
      # the cli has unrelated MCP-SDK type-depth errors; gate only on what we ship here.)
      - name: Type-check (backend + ui)
        run: bunx turbo run lint --filter=@coglity/backend --filter=@coglity/ui

  backend:
    needs: [changes, lint]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and push
        run: |
          docker build -f apps/backend/Dockerfile -t $ACR_LOGIN_SERVER/coglity-backend:${{ github.sha }} -t $ACR_LOGIN_SERVER/coglity-backend:latest .
          docker push $ACR_LOGIN_SERVER/coglity-backend:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/coglity-backend:latest

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppName: coglity-backend
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/coglity-backend:${{ github.sha }}

  ui:
    needs: [changes, lint]
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and push
        run: |
          docker build -f apps/ui/Dockerfile -t $ACR_LOGIN_SERVER/coglity-ui:${{ github.sha }} -t $ACR_LOGIN_SERVER/coglity-ui:latest .
          docker push $ACR_LOGIN_SERVER/coglity-ui:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/coglity-ui:latest

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppName: coglity-ui
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/coglity-ui:${{ github.sha }}

  landing:
    needs: [changes, lint]
    if: needs.changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and push
        run: |
          docker build -f apps/landing/Dockerfile -t $ACR_LOGIN_SERVER/coglity-landing:${{ github.sha }} -t $ACR_LOGIN_SERVER/coglity-landing:latest .
          docker push $ACR_LOGIN_SERVER/coglity-landing:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/coglity-landing:latest

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppName: coglity-landing
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/coglity-landing:${{ github.sha }}

  iac-core:
    needs: changes
    if: needs.changes.outputs.iac-core == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi refresh (core)
        uses: pulumi/actions@v6
        with:
          command: refresh
          stack-name: ${{ secrets.PULUMI_ORG }}/coglity-core/core-prod
          work-dir: apps/iac/core
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: 'true'

      - name: Pulumi up (core)
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ secrets.PULUMI_ORG }}/coglity-core/core-prod
          work-dir: apps/iac/core
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: 'true'

  iac-apps:
    needs: [changes, iac-core]
    if: always() && needs.changes.outputs.iac-apps == 'true' && (needs.iac-core.result == 'success' || needs.iac-core.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi refresh (apps)
        uses: pulumi/actions@v6
        with:
          command: refresh
          stack-name: ${{ secrets.PULUMI_ORG }}/coglity-apps/apps-prod
          work-dir: apps/iac/apps
          config-map: |
            coglity-apps:openaiBaseUrl:
              value: ${{ secrets.OPENAI_BASE_URL }}
              secret: true
            coglity-apps:openaiApiKey:
              value: ${{ secrets.OPENAI_API_KEY }}
              secret: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: 'true'

      - name: Pulumi up (apps)
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ secrets.PULUMI_ORG }}/coglity-apps/apps-prod
          work-dir: apps/iac/apps
          config-map: |
            coglity-apps:openaiBaseUrl:
              value: ${{ secrets.OPENAI_BASE_URL }}
              secret: true
            coglity-apps:openaiApiKey:
              value: ${{ secrets.OPENAI_API_KEY }}
              secret: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: 'true'

  deploy-executor:
    needs: iac-apps
    if: needs.iac-apps.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger coglity-executor deploy
        run: gh workflow run "Build & Deploy Executor" --repo izwr/coglity-executor
        env:
          GH_TOKEN: ${{ secrets.EXECUTOR_DEPLOY_PAT }}
